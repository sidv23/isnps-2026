bibliography: refs.bib
code-line-numbers: true

width: 1600
height: 1000
html:
  mermaid:
    theme: dark

execute:
  freeze: auto
editor:
  render-on-save: true
revealjs-plugins:
  - pointer
filters: 
  - src/bg_style.lua
  - search-replace
  - shinylive
search-replace:
  +br    : <br>\newline
  +iid    : $iid$
  +pvalue    : $p-$value