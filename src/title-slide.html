<section id="$idprefix$title-slide" $for(title-slide-attributes/pairs)$ $it.key$="$it.value$" $endfor$
  class="quarto-title-block">

  $if(location)$
  <span style="text-align: center; vertical-align: top; display:block; margin-top: -10%; margin-bottom: 5%; color: var(--orange);">
    $location$
  </span>
  $endif$

  <h1 class="title">$title$</h1>
  $if(subtitle)$
  <!-- <p class="subtitle">$subtitle$</p> -->
  <h2 style="text-align: center; font-size: 150%; margin-bottom: 1%;">$subtitle$</h2>
  $endif$

  $for(author)$
  <p class="author">$author$</p>
  $endfor$
  $if(coauthor)$
  <br> with <br>
  $endif$
  $for(coauthor)$
  <b style="font-size: 90%;">$coauthor$</b>
  $endfor$
  $for(institute)$
  <p class="institute">$institute$</p>
  $endfor$
  $if(date)$
  <p class="date">$date$</p>
  $endif$
</section>
