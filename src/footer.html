<script>
  const manual = new Freezeframe('.my-class-3', {
    trigger: false
  });

  document
    .querySelector('.start')
    .addEventListener('click', () => {
      manual.start();
    });

  document
    .querySelector('.stop')
    .addEventListener('click', () => {
      manual.stop();
    });
</script>
